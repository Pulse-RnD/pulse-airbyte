documentationUrl: https://docs.airbyte.com/integrations/sources/google-directory-v2
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  title: Google Directory V2 Spec
  type: object
  required:
    - credentials_json
    - admin_email
  additionalProperties: true
  properties:
    credentials_json:
      title: Service Account Key
      description: "The Service Account key in JSON format with access to the Google Directory API. See the docs for more information on how to generate this key."
      type: object
      order: 0
      examples:
        - type: "service_account"
          project_id: "your-project-123"
          private_key_id: "123456789"
          private_key: "-----BEGIN PRIVATE KEY-----\nMIIE... ...==\n-----END PRIVATE KEY-----\n"
          client_email: "your-service-account@your-project.iam.gserviceaccount.com"
          client_id: "123456789"
          auth_uri: "https://accounts.google.com/o/oauth2/auth"
          token_uri: "https://oauth2.googleapis.com/token"
          auth_provider_x509_cert_url: "https://www.googleapis.com/oauth2/v1/certs"
          client_x509_cert_url: "https://www.googleapis.com/robot/v1/metadata/x509/your-service-account%40your-project.iam.gserviceaccount.com"
      airbyte_secret: true

    admin_email:
      title: Admin Email
      description: "The email of the workspace admin the service account is acting on behalf of"
      type: string
      order: 1
      examples:
        - "admin@yourcompany.com"
      pattern: "^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$"

    customer_id:
      title: Customer ID
      description: "The Google Workspace customer ID to use. Defaults to 'my_customer' which means the customer the service account belongs to."
      type: string
      default: "my_customer"
      order: 2
      examples:
        - "C01234567"
        - "my_customer"

streams:
  - name: users
    supported_sync_modes:
      - full_refresh
      - incremental
    source_defined_cursor: true
    json_schema:
      $schema: http://json-schema.org/draft-07/schema#
      type: object
      properties:
        id:
          type: string
          description: "The unique ID for the user"
        primaryEmail:
          type: string
          description: "The user's primary email address"
        name:
          type: object
          properties:
            givenName:
              type: string
            familyName:
              type: string
            fullName:
              type: string
        isAdmin:
          type: boolean
          description: "Whether the user is a super admin"
        isDelegatedAdmin:
          type: boolean
        creationTime:
          type: string
          format: date-time
        lastLoginTime:
          type: string
          format: date-time
        suspended:
          type: boolean
        archived:
          type: boolean
        changePasswordAtNextLogin:
          type: boolean
        ipWhitelisted:
          type: boolean
        emails:
          type: array
          items:
            type: object
            properties:
              address:
                type: string
              type:
                type: string
        customerId:
          type: string
        orgUnitPath:
          type: string
        isMailboxSetup:
          type: boolean
        includeInGlobalAddressList:
          type: boolean

  - name: groups
    supported_sync_modes:
      - full_refresh
    source_defined_cursor: false
    json_schema:
      $schema: http://json-schema.org/draft-07/schema#
      type: object
      properties:
        id:
          type: string
          description: "The unique ID of the group"
        email:
          type: string
          description: "The group's email address"
        name:
          type: string
          description: "The group's display name"
        description:
          type: string
          description: "Description of the group"
        directMembersCount:
          type: integer
          description: "Number of direct members in the group"
        adminCreated:
          type: boolean
          description: "Whether this group was created by an administrator"
        aliases:
          type: array
          items:
            type: string
          description: "List of group's email aliases"
        nonEditableAliases:
          type: array
          items:
            type: string
        allowExternalMembers:
          type: boolean
        allowWebPosting:
          type: boolean
        customerId:
          type: string
        organizationUnit:
          type: string